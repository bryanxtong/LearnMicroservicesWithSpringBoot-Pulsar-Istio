apiVersion: v1
kind: ConfigMap
metadata:
  name: logs
  namespace: microservices
data:
  application.properties: |
    spring.pulsar.template.observations-enabled=true
    spring.pulsar.listener.observation-enabled=true

    management.tracing.sampling.probability=1
    logging.level.org.springframework.core.env=DEBUG
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logs
  namespace: microservices
  labels:
    app: logs
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logs
  template:
    metadata:
      labels:
        app: logs
        version: v1
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "6650,8080,8580,443"
        traffic.sidecar.istio.io/excludeOutboundIPs: "10.0.0.0/8"
    spec:
      containers:
      - name: logs
        image: logs:0.0.1-SNAPSHOT
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8580
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: SPRING_CLOUD_PULSAR_HOST
          value: "pulsar"
        - name: SPRING_CLOUD_ZIPKIN_HOST
          value: "zipkin"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8580
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8580
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: logs
  namespace: microservices
  labels:
    app: logs
spec:
  type: ClusterIP
  ports:
  - port: 8580
    targetPort: 8580
    protocol: TCP
    name: http
  selector:
    app: logs
