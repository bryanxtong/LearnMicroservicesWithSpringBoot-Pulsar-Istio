apiVersion: v1
kind: ConfigMap
metadata:
  name: gamification
  namespace: microservices
data:
  application.properties: |
    # Gives us access to the H2 database web console
    spring.h2.console.enabled=true
    # Creates the database in a file
    spring.datasource.url=jdbc:h2:file:~/gamification;AUTO_SERVER=TRUE
    # Creates or updates the schema if needed
    spring.jpa.hibernate.ddl-auto=update
    # For educational purposes we will show the SQL in console
    # spring.jpa.show-sql=true

    spring.cloud.compatibility-verifier.enabled=false

    ##to avoid the pulsar listener creating non-partitioned topic
    pulsar.attempts.topic=attempts.topic
    pulsar.attempts.partitions=4

    spring.pulsar.template.observations-enabled=true
    spring.pulsar.listener.observation-enabled=true

    ##During the process of creating the pulsar lazy producer in appender, there should no logs in the pulsar client code to append logs which would lead to dead lock
    ##Disable logs for pulsar client to avoid deadlock
    logging.level.org.apache.pulsar.client.impl=OFF

    logging.include-application-name=false
    management.tracing.sampling.probability=1
    logging.level.org.springframework.core.env=DEBUG
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gamification
  namespace: microservices
  labels:
    app: gamification
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gamification
  template:
    metadata:
      labels:
        app: gamification
        version: v1
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "6650,8080,8081,443"
        traffic.sidecar.istio.io/excludeOutboundIPs: "10.0.0.0/8"
    spec:
      containers:
      - name: gamification
        image: gamification:0.0.1-SNAPSHOT
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: SPRING_CLOUD_PULSAR_HOST
          value: "pulsar"
        - name: SPRING_CLOUD_ZIPKIN_HOST
          value: "zipkin"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gamification
  namespace: microservices
  labels:
    app: gamification
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  selector:
    app: gamification
