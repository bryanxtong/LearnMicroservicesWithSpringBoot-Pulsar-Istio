apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: microservices
data:
  default.conf: |
    server {
      listen 80;
      server_name localhost;

      location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: challenges-frontend
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: challenges-frontend
  template:
    metadata:
      labels:
        app: challenges-frontend
    spec:
      containers:
      - name: frontend
        image: challenges-frontend:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: nginx-config
        configMap:
          name: frontend-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: challenges-frontend
  namespace: microservices
spec:
  selector:
    app: challenges-frontend
  ports:
  - port: 80
    targetPort: 80
