apiVersion: v1
kind: ConfigMap
metadata:
  name: multiplication
  namespace: microservices
data:
  application.properties: |
    spring.application.name=multiplication
    spring.h2.console.enabled=true
    spring.datasource.url=jdbc:h2:file:~/multiplication;AUTO_SERVER=TRUE
    spring.jpa.hibernate.ddl-auto=update
    pulsar.attempts.topic=attempts.topic
    pulsar.attempts.partitions=4
    logging.level.org.apache.pulsar.client.impl=OFF
    spring.pulsar.template.observations-enabled=true
    spring.pulsar.listener.observation-enabled=true
    logging.pattern.level=[${spring.application.name:-},%X{traceId:-},%X{spanId:-}]
    logging.include-application-name=false
    management.tracing.sampling.probability=1
    logging.level.org.springframework.core.env=DEBUG
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multiplication
  namespace: microservices
  labels:
    app: multiplication
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multiplication
  template:
    metadata:
      labels:
        app: multiplication
        version: v1
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "6650,8080"
    spec:
      containers:
      - name: multiplication
        image: multiplication:0.0.1-SNAPSHOT
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: SPRING_CLOUD_PULSAR_HOST
          value: "pulsar"
        - name: SPRING_CLOUD_ZIPKIN_HOST
          value: "zipkin"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: multiplication
  namespace: microservices
  labels:
    app: multiplication
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: multiplication
